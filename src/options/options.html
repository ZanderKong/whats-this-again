<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title data-i18n="app.settingsTitle">这是啥来着 设置</title>
    <link rel="stylesheet" href="./options.css">
  </head>
  <body>
    <main class="shell">
      <header class="hero">
        <div>
          <p class="eyebrow" data-i18n="app.name">这是啥来着</p>
          <h1 data-i18n="app.subtitle">记忆式阅读助手</h1>
        </div>
        <p class="status" id="status" role="status" aria-live="polite" data-i18n="options.statusReady">已生效</p>
      </header>

      <form id="settings-form" class="grid">
        <section class="section">
          <h2 data-i18n="options.api">API</h2>
          <label>
            <span data-i18n="options.modelProvider">模型提供商</span>
            <select id="modelProvider" name="modelProvider"></select>
          </label>
          <label>
            API Base URL
            <input id="apiBaseUrl" name="apiBaseUrl" type="url" placeholder="https://api.deepseek.com/v1" autocomplete="off">
          </label>
          <label>
            API Key
            <input id="apiKey" name="apiKey" type="password" placeholder="sk-..." autocomplete="off">
          </label>
          <label>
            Model
            <input id="model" name="model" type="text" list="model-list" placeholder="deepseek-chat" autocomplete="off">
            <datalist id="model-list"></datalist>
          </label>
          <div class="actions">
            <button class="button primary" type="submit" data-i18n="options.saveSettings">保存设置</button>
            <button class="button" id="refresh-models" type="button" data-i18n="options.refreshModels">刷新模型列表</button>
            <button class="button" id="test-api" type="button" data-i18n="options.testConnection">测试连接</button>
          </div>
          <p class="hint" data-i18n="options.apiHint">拉不到模型列表时，仍可直接手动填写 OpenAI-compatible 模型名。本地 Ollama/LM Studio 可以留空 API Key。</p>
        </section>

        <section class="section">
          <h2 data-i18n="options.question">提问</h2>
          <label>
            <span data-i18n="options.language">语言</span>
            <select id="language" name="language"></select>
          </label>
          <label>
            <span data-i18n="options.defaultPrompt">默认 Prompt</span>
            <textarea id="defaultQuestion" name="defaultQuestion" rows="5" data-i18n-placeholder="options.defaultPrompt" readonly></textarea>
          </label>
          <p class="hint" data-i18n-html="options.promptHint">可使用 <code>{{term}}</code> 代表划线内容。</p>
          <label class="choice">
            <input id="includePageContext" name="includePageContext" type="checkbox">
            <span data-i18n="options.includeContext">划线提问时附带选区前后上下文</span>
          </label>
        </section>

        <section class="section">
          <h2 data-i18n="options.memoryRules">记忆规则</h2>
          <label>
            <span data-i18n="options.defaultSaveScope">默认保存范围</span>
            <select id="defaultSaveScope" name="defaultSaveScope"></select>
          </label>
          <label class="choice">
            <input id="hideReminders" name="hideReminders" type="checkbox">
            <span data-i18n="options.hideReminders">临时隐藏历史悬浮提醒</span>
          </label>
        </section>

        <section class="section">
          <h2 data-i18n="options.theme">主题色</h2>
          <div class="color-control">
            <span data-i18n="options.theme">主题色</span>
            <div id="theme-presets" class="swatches" data-i18n-aria-label="popup.themeColorAria" aria-label="主题色预设"></div>
          </div>
          <p class="hint" data-i18n="options.themeHint">主题色会同步到圆点、输入框、回答框和工具栏弹窗。</p>
        </section>

        <section class="section danger-zone">
          <h2 data-i18n="options.historyData">历史数据</h2>
          <p id="memory-count" class="hint" data-i18n="options.memoryInitial">已保存 0 条记忆。</p>
          <p id="annotation-count" class="hint">已保存 0 个批注批次。</p>
          <div class="actions">
            <button class="button" id="open-history" type="button" data-i18n="options.openExplanationHistory">查看历史解释</button>
            <button class="button" id="open-annotation-history" type="button" data-i18n="options.openAnnotationHistory">查看历史批注</button>
          </div>
          <button class="button danger" id="clear-memories" type="button" data-i18n="options.clearMemories">清空所有历史记忆</button>
          <button class="button danger" id="clear-annotations" type="button" data-i18n="options.clearAnnotations">清空历史批注</button>
        </section>
      </form>
    </main>

    <script src="../shared/constants.js"></script>
    <script src="./options.js"></script>
  </body>
</html>
