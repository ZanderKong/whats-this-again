<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title data-i18n="app.historyTitle">这是啥来着 历史解释</title>
    <link rel="stylesheet" href="./history.css">
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <p class="eyebrow" data-i18n="app.name">这是啥来着</p>
          <h1 id="history-heading" data-i18n="history.title">历史记录</h1>
        </div>
        <div class="top-actions">
          <button class="button primary" id="open-options" type="button" data-i18n="history.openOptions">设置</button>
        </div>
      </header>

      <nav class="history-tabs" aria-label="History type">
        <button class="tab-button" id="tab-explanations" type="button" data-tab="explanations" data-i18n="history.tabExplanations">历史解释</button>
        <button class="tab-button" id="tab-annotations" type="button" data-tab="annotations" data-i18n="history.tabAnnotations">历史批注</button>
      </nav>

      <section class="toolbar" data-i18n-aria-label="history.toolbarLabel" aria-label="历史筛选">
        <label class="search" for="search">
          <span class="sr-only" data-i18n="history.search">搜索</span>
          <input id="search" type="search" data-i18n-placeholder="history.searchPlaceholder" placeholder="保存词、回答内容、网站">
        </label>
        <div id="scope-filter-wrap" class="filter-chips" role="group" data-i18n-aria-label="history.filter" aria-label="筛选">
          <button type="button" class="filter-chip active" data-scope="all" data-i18n="history.filterAll">全部</button>
          <button type="button" class="filter-chip" data-scope="currentPage" data-i18n="history.filterCurrentPage">仅当前页面</button>
          <button type="button" class="filter-chip" data-scope="currentSite" data-i18n="history.filterCurrentSite">当前网站</button>
          <button type="button" class="filter-chip" data-scope="global" data-i18n="history.filterGlobal">全部网页</button>
        </div>
      </section>

      <p class="summary sr-only" id="summary" aria-live="polite" data-i18n="history.loading">读取历史中...</p>
      <section id="history-list" class="history-list" aria-live="polite"></section>
    </main>

    <script src="../shared/constants.js"></script>
    <script src="../shared/annotations.js"></script>
    <script src="./history.js"></script>
  </body>
</html>
